<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200">
  <title>HoangCinema</title>
  <defs>
    <style>
      .word-main { font-family: 'Bebas Neue', Impact, sans-serif; fill: #F5F1E8; }
      .word-sub  { font-family: 'Bebas Neue', Impact, sans-serif; fill: #D4AF37; letter-spacing: 10px; }
    </style>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a1024"/>
      <stop offset="100%" stop-color="#c81e3a"/>
    </linearGradient>
    <clipPath id="badgeClip"><rect x="20" y="20" width="160" height="160" rx="28"/></clipPath>
  </defs>

  <rect x="20" y="20" width="160" height="160" rx="28" fill="url(#badgeGrad)"/>

  <g clip-path="url(#badgeClip)">
    <polygon points="36,150 176,44 176,104" fill="#F5F1E8" opacity="0.16"/>
    <circle cx="86" cy="110" r="2" fill="#F5F1E8" opacity="0.55"/>
    <circle cx="111" cy="90" r="1.4" fill="#F5F1E8" opacity="0.45"/>
    <circle cx="136" cy="72" r="1.8" fill="#F5F1E8" opacity="0.5"/>
    <circle cx="76" cy="130" r="1.4" fill="#F5F1E8" opacity="0.4"/>
  </g>

  <rect x="64" y="60" width="20" height="80" rx="4" fill="#F5F1E8"/>
  <rect x="116" y="60" width="20" height="80" rx="4" fill="#F5F1E8"/>
  <rect x="64" y="90" width="72" height="20" rx="4" fill="#F5F1E8"/>

  <circle cx="74" cy="46" r="4" fill="#D4AF37"/>
  <circle cx="126" cy="46" r="4" fill="#D4AF37"/>
  <circle cx="74" cy="154" r="4" fill="#D4AF37"/>
  <circle cx="126" cy="154" r="4" fill="#D4AF37"/>

  <text x="220" y="108" class="word-main" font-size="64">HOANG</text>
  <text x="222" y="145" class="word-sub" font-size="24">CINEMA</text>
